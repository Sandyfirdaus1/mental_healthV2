<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Ubah Password</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static', filename='assets/css/login/style.css')}}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.materialdesignicons.com/3.0.39/css/materialdesignicons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body.img.js-fullheight {
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .main-center-container {
        width: 100vw;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-wrap {
        background: rgba(16, 16, 16, 0.18);
        border-radius: 2em;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
        padding: 4.5em 5em 4em 5em;
        margin-top: 0;
        width: 100%;
        max-width: 400px;
      }
      .form-control {
        background: rgba(255, 255, 255, 0.4);
        border-radius: 2em;
        border: none;
        margin-bottom: 1em;
        font-size: 1.1em;
        padding: 0.9em 1.5em;
        color: #222;
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.6);
        box-shadow: 0 0 0 2px #b2dfdb;
        color: #222;
      }
      .btn {
        border-radius: 2em;
        font-size: 1.2em;
        background: #ffd6c0;
        color: #222;
        border: none;
        font-weight: bold;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #ffbfa0;
        color: #222;
      }
      .form-check-label,
      .form-check-input {
        cursor: pointer;
      }
      .heading-section {
        color: #fff;
        font-weight: 600;
        margin-bottom: 1.5em;
        text-align: center;
      }
      .form-group p.help {
        color: #e57373;
        font-size: 0.95em;
        margin: 0.2em 0 0 0.5em;
      }
      @media (max-width: 768px) {
        .login-wrap {
          padding: 2em 1em 2em 1em;
          max-width: 100%;
        }
        .form-control {
          font-size: 1em;
          padding: 0.7em 1em;
        }
        .btn {
          font-size: 1em;
          padding: 0.7em 1em;
        }
        .heading-section {
          font-size: 1.3em;
        }
      }
      @media (max-width: 480px) {
        .login-wrap {
          padding: 1.2em 0.5em 1.2em 0.5em;
        }
        .heading-section {
          font-size: 1.1em;
        }
      }
    </style>
    <script>
      function is_nickname(asValue) {
        var regExp = /^(?=.*[a-zA-Z])[-a-zA-Z0-9_.]{2,10}$/;
        return regExp.test(asValue);
      }
      function is_password(asValue) {
        let regExp = /^(?=.*\d)[A-Za-z\d]{8,20}$/;
        return regExp.test(asValue);
      }
      function ubahPassword() {
        let username = $("#username").val();
        let password = $("#password").val();
        let passwordNew = $("#passwordNew").val();
        let konfirmasiPassword = $("#konfirmasiPassword").val();
        if (username === "") {
          $("#helpusername")
            .text("Silahkan Masukan Username!")
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#username").focus();
          return;
        }
        $("#helpusername")
          .text("")
          .removeClass("is-safe")
          .addClass("is-danger");
        if (password === "") {
          $("#helpPassword")
            .text("Silahkan Masukan Password!")
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#password").focus();
          return;
        }
        $("#helpPassword")
          .text("")
          .removeClass("is-safe")
          .addClass("is-danger");
        if (passwordNew === "") {
          $("#helpPasswordNew")
            .text("Silahkan Masukan Password Baru!")
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#passwordNew").focus();
          return;
        }
        $("#helpPasswordNew")
          .text("")
          .removeClass("is-safe")
          .addClass("is-danger");
        if (!is_password(passwordNew)) {
          $("#helpPasswordNew")
            .text(
              "Penulisan password harus menggunakan kombinasi angka, minimal 8-20 karakter!"
            )
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#passwordNew").focus();
          return;
        }
        if (konfirmasiPassword === "") {
          $("#helpKonfirmasiPassword")
            .text("Silahkan Masukan Konfirmasi Password!")
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#konfirmasiPassword").focus();
          return;
        }
        $("#helpKonfirmasiPassword")
          .text("")
          .removeClass("is-safe")
          .addClass("is-danger");
        if (konfirmasiPassword !== passwordNew) {
          $("#helpKonfirmasiPassword")
            .text("Password tidak sesuai!")
            .removeClass("is-safe")
            .addClass("is-danger");
          $("#konfirmasiPassword").focus();
          return;
        }
        $.ajax({
          type: "POST",
          url: "/ubah-password-check",
          data: {
            username: username,
            password: password,
            newPassword: passwordNew,
          },
          success: function (response) {
            if (response["result"] === "success") {
              Swal.fire({
                title: "Ubah Password Berhasil",
                text: `Password berhasil diubah!`,
                icon: "success",
                confirmButtonText: "Oke",
                confirmButtonColor: "#39ce7d",
              }).then((result) => {
                if (result.isConfirmed) {
                  window.location.replace("/login");
                }
              });
            } else {
              $("#helpusername")
                .text("Silahkan Masukan Username!")
                .removeClass("is-safe")
                .addClass("is-danger");
              $("#username").focus();
              return;
            }
          },
        });
      }
    </script>
  </head>
  <body
    class="img js-fullheight"
    style="background-image: url(../static/assets/img/bg-login.jpg)"
  >
    <div class="main-center-container">
      <section class="ftco-section">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-6 text-center mb-5">
              <h2 class="heading-section">Ubah Password</h2>
            </div>
          </div>
          <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
              <div class="login-wrap p-0">
                <form action="#" class="signin-form">
                  <div class="form-group">
                    <input
                      type="text"
                      class="form-control"
                      placeholder="Username"
                      id="username"
                    />
                    <p id="helpusername" class="help is-hidden"></p>
                  </div>
                  <div class="form-group">
                    <input
                      type="password"
                      class="form-control"
                      placeholder="Password Lama"
                      id="password"
                    />
                    <p id="helpPassword" class="help is-hidden"></p>
                  </div>
                  <div class="form-group">
                    <input
                      type="password"
                      class="form-control"
                      placeholder="Password Baru"
                      id="passwordNew"
                    />
                    <p id="helpPasswordNew" class="help is-hidden"></p>
                  </div>
                  <div class="form-group">
                    <input
                      type="password"
                      class="form-control"
                      placeholder="Konfirmasi Password Baru"
                      id="konfirmasiPassword"
                    />
                    <p id="helpKonfirmasiPassword" class="help is-hidden"></p>
                  </div>
                  <div class="form-group">
                    <input
                      type="checkbox"
                      id="showPasswordCheckbox"
                      onclick="togglePasswordVisibility()"
                    />
                    <label for="showPasswordCheckbox" style="color: #fff"
                      >Tampilkan Password</label
                    >
                  </div>
                  <div class="form-group">
                    <button
                      type="button"
                      class="form-control btn btn-primary submit px-3 w-100"
                      onclick="ubahPassword()"
                    >
                      Ubah Password
                    </button>
                  </div>
                  <div class="form-group">
                    <div class="w-100">
                      <div
                        class="d-flex justify-content-between align-items-center mb-2"
                      >
                        <div>
                          <a
                            href="/login"
                            style="color: #fff; margin-left: 5px"
                            class="register-btn"
                            >Kembali ke Login</a
                          >
                        </div>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script>
      function togglePasswordVisibility() {
        const passwordField = document.getElementById("password");
        const passwordNewField = document.getElementById("passwordNew");
        const confirmPasswordField =
          document.getElementById("konfirmasiPassword");
        const isChecked = document.getElementById(
          "showPasswordCheckbox"
        ).checked;
        passwordField.type =
          passwordNewField.type =
          confirmPasswordField.type =
            isChecked ? "text" : "password";
      }
    </script>
    <script src="{{url_for('static', filename='assets/js/login/jquery.min.js')}}"></script>
    <script src="{{url_for('static', filename='assets/js/login/popper.js')}}"></script>
    <script src="{{url_for('static', filename='assets/js/login/bootstrap.min.js')}}"></script>
    <script src="{{url_for('static', filename='assets/js/login/main.js')}}"></script>
  </body>
</html>
